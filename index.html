<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawdbot's Awesome Bookmarks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        :root {
            --bg-color: rgba(10, 10, 20, 0.7);
            --card-bg-color: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #E0E0E0;
            --primary-color: #007bff;
            --light-text: #B0B0B0;
            --hidden-card-bg: rgba(255, 255, 255, 0.03);
            --hidden-card-border: rgba(255, 255, 255, 0.05);
            --hidden-card-text: #606060;
            --drag-placeholder-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow-x: hidden;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px) saturate(1.8);
            -webkit-backdrop-filter: blur(15px) saturate(1.8);
            border: 1px solid var(--border-color);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .controls button {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        .controls button:hover {
            background-color: #5a6268;
            transform: translateY(-1px);
        }

        .controls button#addBookmarkBtn {
            background-color: #28a745;
        }
        .controls button#addBookmarkBtn:hover {
            background-color: #218838;
        }


        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .bookmark-card {
            background: var(--card-bg-color);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px) brightness(1.1);
            -webkit-backdrop-filter: blur(10px) brightness(1.1);
            cursor: grab;
        }

        .bookmark-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-color);
        }

        .bookmark-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--color, rgba(0,0,0,0.2)) 0%, transparent 100%);
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
        }

        /* Styles for hidden cards */
        .bookmark-card.hidden {
            background: var(--hidden-card-bg);
            border-color: var(--hidden-card-border);
            opacity: 0.6;
            filter: grayscale(80%);
            cursor: default;
        }
        .bookmark-card.hidden .bookmark-title,
        .bookmark-card.hidden .bookmark-url {
            color: var(--hidden-card-text);
        }
        .bookmark-card.hidden::before {
            opacity: 0.3;
        }

        .bookmark-card.hidden.show-hidden-mode {
            opacity: 0.8;
            filter: none;
            border-color: #606060;
            cursor: grab;
        }


        .bookmark-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 10px;
            z-index: 1;
            position: relative;
        }

        .bookmark-url {
            font-size: 0.9em;
            color: var(--light-text);
            word-break: break-all;
            margin-bottom: 15px;
            z-index: 1;
            position: relative;
        }

        .bookmark-actions {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            z-index: 1;
            position: relative;
        }

        .bookmark-actions button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 123, 255, 0.3);
        }

        .bookmark-actions button:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }

        .bookmark-actions .delete-btn {
            background-color: #dc3545;
            box-shadow: 0 2px 5px rgba(220, 53, 69, 0.3);
        }
        .bookmark-actions .delete-btn:hover {
            background-color: #c82333;
        }


        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            z-index: 1;
            position: relative;
        }

        .edit-form input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-color);
            font-size: 1em;
            outline: none;
        }

        .edit-form input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        .edit-form button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 5px rgba(40, 167, 69, 0.3);
        }

        .edit-form button:hover {
            background-color: #218838;
        }

        /* Drag and Drop styles */
        .bookmark-card.dragging {
            opacity: 0.5;
            border: 2px dashed var(--primary-color);
        }
        .bookmark-card.drag-over {
            border: 2px dashed #ffc107; /* Highlight drop target */
        }
        .drag-placeholder {
            opacity: 0;
            height: 0;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
            background-color: var(--drag-placeholder-bg);
            border-radius: 15px;
            border: 1px dashed var(--primary-color);
        }
        .drag-placeholder.visible {
            height: 200px;
            margin-bottom: 20px;
            opacity: 1;
        }


        /* Responsive adjustments */
        @media (max-width: 768px) {
            .bookmark-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8em;
            }
            .container {
                padding: 15px;
            }
            .controls {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clawdbot's Awesome Bookmarks</h1>
        <div class="controls">
            <button id="toggleHiddenBtn" onclick="toggleHiddenMode()">H (Hidden Off)</button>
            <button id="addBookmarkBtn" onclick="addBookmark()">Add Bookmark</button>
        </div>
        <div class="bookmark-grid" id="bookmarkGrid">
            <!-- Bookmarks will be loaded here by JavaScript -->
        </div>
    </div>

    <script>
        const bookmarkGrid = document.getElementById('bookmarkGrid');
        const toggleHiddenBtn = document.getElementById('toggleHiddenBtn');
        let bookmarks = [];
        let draggedItem = null;
        let showHiddenMode = false;

        async function fetchBookmarks() {
            try {
                const response = await fetch('/api/bookmarks');
                bookmarks = await response.json();
                renderBookmarks();
            } catch (error) {
                console.error('Error fetching bookmarks:', error);
                bookmarkGrid.innerHTML = '<p style="color: red; text-align: center;">Failed to load bookmarks. Is the server running?</p>';
            }
        }

        async function saveBookmarks() {
            try {
                // Ensure IDs are sequential and up-to-date before saving
                bookmarks.forEach((b, index) => {
                    b.id = index + 1;
                });
                
                await fetch('/api/bookmarks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bookmarks)
                });
                console.log('Bookmarks saved successfully!');
            } catch (error) {
                console.error('Error saving bookmarks:', error);
                alert('Failed to save bookmarks. Check server status.');
            }
        }

        function renderBookmarks() {
            bookmarkGrid.innerHTML = '';
            bookmarks.forEach(bookmark => {
                const card = document.createElement('div');
                card.className = 'bookmark-card';
                card.setAttribute('data-id', bookmark.id);
                card.style.setProperty('--color', bookmark.color);
                
                if (bookmark.hidden) {
                    card.classList.add('hidden');
                    if (showHiddenMode) {
                        card.classList.add('show-hidden-mode');
                        card.setAttribute('draggable', 'true');
                    } else {
                        card.style.display = 'none';
                        card.setAttribute('draggable', 'false');
                    }
                } else {
                    card.setAttribute('draggable', 'true');
                }

                card.innerHTML = `
                    <div class="bookmark-content">
                        <div class="bookmark-title">${bookmark.title || 'New Bookmark'}</div>
                        <div class="bookmark-url">${bookmark.url || 'No URL'}</div>
                    </div>
                    <div class="bookmark-actions">
                        <button onclick="editBookmark(${bookmark.id})">Edit</button>
                        <button onclick="window.open('${bookmark.url}', '_blank')" ${!bookmark.url ? 'disabled' : ''}>Go</button>
                        <button onclick="${bookmark.hidden ? `showBookmark(${bookmark.id})` : `hideBookmark(${bookmark.id})`}"
                                class="${bookmark.hidden ? 'show-btn' : 'hide-btn'}"
                                style="background-color: ${bookmark.hidden ? '#28a745' : '#dc3545'};">
                            ${bookmark.hidden ? 'S' : 'H'}
                        </button>
                        <button onclick="deleteBookmark(${bookmark.id})" class="delete-btn">X</button>
                    </div>
                `;
                bookmarkGrid.appendChild(card);
            });

            addDragAndDropListeners();
            updateToggleButtonText();
        }

        function addDragAndDropListeners() {
            const cards = document.querySelectorAll('.bookmark-card[draggable="true"]');
            cards.forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('dragleave', handleDragLeave);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragend', handleDragEnd);
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.bookmark-card:not(.dragging)')];

            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: -Number.POSITIVE_INFINITY }).element;
        }

        let placeholder = null;

        function handleDragStart(e) {
            if (this.classList.contains('hidden') && !this.classList.contains('show-hidden-mode')) {
                e.preventDefault();
                return;
            }
            draggedItem = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.getAttribute('data-id'));
            this.classList.add('dragging');

            placeholder = document.createElement('div');
            placeholder.className = 'drag-placeholder';
            this.parentNode.insertBefore(placeholder, this.nextSibling);
            setTimeout(() => placeholder.classList.add('visible'), 0);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (draggedItem && this !== draggedItem && placeholder) {
                const afterElement = getDragAfterElement(bookmarkGrid, e.clientY);
                if (afterElement == null) {
                    bookmarkGrid.appendChild(placeholder);
                } else {
                    bookmarkGrid.insertBefore(placeholder, afterElement);
                }
            }
        }

        function handleDragLeave() {
            // No explicit action needed for dragleave on individual cards
        }

        async function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');

            if (draggedItem && placeholder) {
                placeholder.classList.remove('visible');
                setTimeout(() => {
                    if (placeholder && placeholder.parentNode) {
                        placeholder.parentNode.removeChild(placeholder);
                    }
                    placeholder = null;
                }, 300);

                const draggedId = parseInt(draggedItem.getAttribute('data-id'));
                const placeholderIndex = Array.from(bookmarkGrid.children).indexOf(placeholder);

                if (placeholderIndex !== -1) {
                    const draggedBookmarkIndex = bookmarks.findIndex(b => b.id === draggedId);
                    const [removed] = bookmarks.splice(draggedBookmarkIndex, 1);
                    bookmarks.splice(placeholderIndex, 0, removed);

                    renderBookmarks();
                    await saveBookmarks();
                }
            }
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            const cards = document.querySelectorAll('.bookmark-card');
            cards.forEach(card => {
                card.classList.remove('drag-over');
            });
            if (placeholder && placeholder.parentNode) {
                placeholder.classList.remove('visible');
                setTimeout(() => {
                    if (placeholder && placeholder.parentNode) {
                        placeholder.parentNode.removeChild(placeholder);
                    }
                    placeholder = null;
                }, 300);
            }
            draggedItem = null;
        }

        function editBookmark(id) {
            const bookmark = bookmarks.find(b => b.id === id);
            if (!bookmark) return;

            const card = bookmarkGrid.querySelector(`[data-id="${id}"]`);
            if (card) {
                card.setAttribute('draggable', 'false');
                if (placeholder && placeholder.parentNode) {
                    placeholder.parentNode.removeChild(placeholder);
                    placeholder = null;
                }
                card.innerHTML = `
                    <form class="edit-form" onsubmit="saveEditedBookmark(event, ${id})">
                        <input type="text" name="title" value="${bookmark.title}" placeholder="Title" required>
                        <input type="url" name="url" value="${bookmark.url}" placeholder="URL (e.g., https://example.com)">
                        <input type="color" name="color" value="${bookmark.color}" title="Choose Color">
                        <button type="submit">Save</button>
                        <button type="button" onclick="cancelEdit(${id})" style="background-color: #dc3545;">Cancel</button>
                    </form>
                `;
            }
        }

        async function saveEditedBookmark(event, id) {
            event.preventDefault();
            const form = event.target;
            const updatedBookmark = {
                id: id,
                title: form.title.value,
                url: form.url.value,
                color: form.color.value,
                hidden: bookmarks.find(b => b.id === id).hidden
            };

            const index = bookmarks.findIndex(b => b.id === id);
            if (index !== -1) {
                bookmarks[index] = updatedBookmark;
                await saveBookmarks();
                renderBookmarks();
            }
        }

        function cancelEdit(id) {
            renderBookmarks();
        }

        async function hideBookmark(id) {
            const bookmark = bookmarks.find(b => b.id === id);
            if (bookmark) {
                bookmark.hidden = true;
                await saveBookmarks();
                renderBookmarks();
            }
        }

        async function showBookmark(id) {
            const bookmark = bookmarks.find(b => b.id === id);
            if (bookmark) {
                bookmark.hidden = false;
                await saveBookmarks();
                renderBookmarks();
            }
        }

        async function addBookmark() {
            const newId = bookmarks.length > 0 ? Math.max(...bookmarks.map(b => b.id)) + 1 : 1;
            const newBookmark = {
                id: newId,
                title: "New Bookmark",
                url: "",
                color: "#607D8B",
                hidden: false
            };
            bookmarks.push(newBookmark);
            await saveBookmarks();
            renderBookmarks();
            editBookmark(newId);
        }

        async function deleteBookmark(id) {
            if (confirm("Are you sure you want to delete this bookmark?")) {
                bookmarks = bookmarks.filter(b => b.id !== id);
                await saveBookmarks();
                renderBookmarks();
            }
        }

        function toggleHiddenMode() {
            showHiddenMode = !showHiddenMode;
            updateToggleButtonText();
            renderBookmarks();
        }

        function updateToggleButtonText() {
            toggleHiddenBtn.textContent = showHiddenMode ? 'H (Showing Hidden)' : 'H (Hidden Off)';
            toggleHiddenBtn.style.backgroundColor = showHiddenMode ? '#dc3545' : '#6c757d';
        }

        fetchBookmarks();
    </script>
</body>
</html>
